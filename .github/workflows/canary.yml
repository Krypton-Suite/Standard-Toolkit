#
# KILL-SWITCH: To disable this workflow, set repository variable CANARY_DISABLED=true
# Location: Repository Settings → Secrets and variables → Actions → Variables tab
# To re-enable: Set CANARY_DISABLED=false or delete the variable
#
# Runs only when code is pushed to the Canary branch (or when triggered manually).
# Does not run on a schedule.

name: Canary Release

on:
  push:
    branches:
      - Canary
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read

jobs:
  canary:
    runs-on: windows-2025-vs2026
    environment: production  # Requires approval before publishing

    concurrency:
      group: canary-alpha
      cancel-in-progress: true

    steps:
      # Canary Release kill switch
      - name: Canary Release Kill Switch Check
        id: canary_release_kill_switch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $disabled = '${{ vars.CANARY_DISABLED }}'

          if ($disabled -eq 'true') {
            Write-Host "::warning:: Canary Release workflow is currently DISABLED via kill switch (CANARY_DISABLED=true)"
            Write-Host "To re-enable: Go to Repository Settings -> Secrets and Variables -> Actions -> Variables -> Set CANARY_DISABLED to 'false'."
            echo "enabled=false" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Canary Release kill switch check has passed, continuing..."
            echo "enabled=true" >> $env:GITHUB_OUTPUT
          }

      - name: Security - Verify Repository
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:GITHUB_REPOSITORY -ne 'Krypton-Suite/Standard-Toolkit') {
            Write-Error "Security: Invalid repository '$env:GITHUB_REPOSITORY'. This workflow should only run on Krypton-Suite/Standard-Toolkit"
            exit 1
          }
          Write-Host "✓ Repository verified: $env:GITHUB_REPOSITORY"

      - name: Security - Verify Branch
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # This workflow is for the Canary branch only (push to Canary or manual run from Canary)
          if ($env:GITHUB_REF -ne 'refs/heads/Canary') {
            Write-Error "Security: Canary release only runs from branch Canary. Current ref: '$env:GITHUB_REF'. For manual run, select branch 'Canary' in the workflow dispatch."
            exit 1
          }
          Write-Host "✓ Branch verified: $env:GITHUB_REF"

      - name: Checkout
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        uses: actions/checkout@v7
        with:
          ref: Canary
          fetch-depth: 0

      # Canary always builds Canary; the workflow file may land before Populate-WebView2.ps1 is merged to Canary.
      - name: Checkout WebView2 CI script overlay
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          sparse-checkout: Scripts/CI/Populate-WebView2.ps1
          sparse-checkout-cone-mode: true
          path: _ci-overlay

      - name: Ensure WebView2 CI script
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dest = Join-Path $env:GITHUB_WORKSPACE 'Scripts/CI/Populate-WebView2.ps1'
          if (Test-Path -LiteralPath $dest) {
            Write-Host 'WebView2 CI script already present on checked-out branch.'
            exit 0
          }
          $src = Join-Path $env:GITHUB_WORKSPACE '_ci-overlay/Scripts/CI/Populate-WebView2.ps1'
          if (-not (Test-Path -LiteralPath $src)) {
            Write-Error @"
          Scripts/CI/Populate-WebView2.ps1 is missing on Canary and on workflow ref ($env:GITHUB_SHA).
          Merge Scripts/CI/Populate-WebView2.ps1 into Canary in the same change set as these workflow updates.
          "@
          }
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $dest) | Out-Null
          Copy-Item -LiteralPath $src -Destination $dest -Force
          Write-Host 'Copied WebView2 CI script from workflow ref onto Canary checkout.'

      # .NET 9 and 10; .NET 11 for net11.0-windows (DOTNET_PREVIEW_SETUP_VERSION when set, else 11.0.x).
      - name: Setup .NET (9 and 10)
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Setup .NET 11 (stable)
        id: setup_dotnet11_stable_canary_yml
        continue-on-error: true
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ vars.DOTNET_PREVIEW_SETUP_VERSION != '' && vars.DOTNET_PREVIEW_SETUP_VERSION || '11.0.x' }}

      - name: Setup .NET 11 (preview fallback)
        if: steps.canary_release_kill_switch.outputs.enabled == 'true' && steps.setup_dotnet11_stable_canary_yml.outcome == 'failure'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ vars.DOTNET_PREVIEW_SETUP_VERSION != '' && vars.DOTNET_PREVIEW_SETUP_VERSION || '11.0.x' }}
          dotnet-quality: preview

      # Preview .NET SDK. DOTNET_PREVIEW_* : repo Variables (same as build.yml / build-testform.yml).
      # USE_DOTNET_PREVIEW=false skips preview SDK install; global.json uses stable SDK below.
      - name: Setup .NET Preview
        if: steps.canary_release_kill_switch.outputs.enabled == 'true' && vars.USE_DOTNET_PREVIEW != 'false'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ vars.DOTNET_PREVIEW_SETUP_VERSION }}
          dotnet-quality: preview

      # Pin sdk.version for CI; preview band follows USE_DOTNET_PREVIEW; stable path prefers .NET 11 for net11.0-windows TFMs.
      - name: Pin SDK via global.json
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        env:
          DOTNET_PREVIEW_SDK_BAND: ${{ vars.DOTNET_PREVIEW_SDK_BAND }}
          USE_DOTNET_PREVIEW: ${{ vars.USE_DOTNET_PREVIEW }}
        run: |
          $ErrorActionPreference = 'Stop'
          # Latest patch line matching $Pattern (same idea as other global.json pins in this repo).
          function Get-ListedSdkVersion([string]$Pattern) {
            $hit = dotnet --list-sdks | Select-String $Pattern | Select-Object -Last 1
            if (-not $hit) { return $null }
            $line = $hit.Line.TrimEnd()
            if ($line -match '^(\d+\.\d+\.\d+)\s') { return $Matches[1] }
            return (($line -split '\s+', 2)[0])
          }

          $usePreview = $env:USE_DOTNET_PREVIEW -ne 'false'
          $sdkVersion = $null
          if (-not $usePreview) {
            $sdkVersion = Get-ListedSdkVersion '11.0'
            if (-not $sdkVersion) { $sdkVersion = Get-ListedSdkVersion '10.0' }
            if (-not $sdkVersion) { $sdkVersion = Get-ListedSdkVersion '9.0' }
          } else {
            if (-not $env:DOTNET_PREVIEW_SDK_BAND) {
              Write-Error 'DOTNET_PREVIEW_SDK_BAND is not set (repository variable).'
            }
            $sdkVersion = Get-ListedSdkVersion $env:DOTNET_PREVIEW_SDK_BAND
            if (-not $sdkVersion) {
              $sdkVersion = Get-ListedSdkVersion '11.0'
            }
            if (-not $sdkVersion) {
              $sdkVersion = Get-ListedSdkVersion '10.0'
            }
          }
          if (-not $sdkVersion) {
            Write-Error 'Could not resolve an SDK version for global.json.'
          }
          Write-Host "Using SDK $sdkVersion"
          @"
          {
            "sdk": {
              "version": "$sdkVersion",
              "rollForward": "latestFeature"
            }
          }
          "@ | Out-File -Encoding utf8 global.json

      - name: Setup MSBuild
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Setup NuGet
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        uses: NuGet/setup-nuget@v4

      - name: Cache NuGet
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        id: nuget_cache_restore
        uses: actions/cache/restore@v5
        continue-on-error: true
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Prerelease WebView2 required for net11.0-windows; stable packages do not support .NET 11 yet.
      - name: Resolve WebView2 version
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        id: webview2_version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $repoRoot = if ($env:GITHUB_WORKSPACE) { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          & (Join-Path $repoRoot 'Scripts/CI/Populate-WebView2.ps1') -Prerelease -ResolveVersionOnly -WriteGitHubOutputVersion

      - name: Restore WebView2 cache
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        id: webview2_cache_restore
        uses: actions/cache/restore@v5
        continue-on-error: true
        with:
          path: ${{ runner.temp }}/webview2
          key: webview2-${{ runner.os }}-${{ steps.webview2_version.outputs.version }}
          restore-keys: |
            webview2-${{ runner.os }}-

      - name: Populate WebView2 (Preview)
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        shell: pwsh
        env:
          WEBVIEW2_VERSION: ${{ steps.webview2_version.outputs.version }}
        run: |
          $ErrorActionPreference = 'Stop'
          $repoRoot = if ($env:GITHUB_WORKSPACE) { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          & (Join-Path $repoRoot 'Scripts/CI/Populate-WebView2.ps1') -Prerelease -Version $env:WEBVIEW2_VERSION

      - name: Save WebView2 cache
        if: success() && steps.canary_release_kill_switch.outputs.enabled == 'true'
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: ${{ runner.temp }}/webview2
          key: ${{ steps.webview2_cache_restore.outputs.cache-primary-key }}

      # /m: multi-processor MSBuild (all runner CPUs). canary.proj orchestrates Krypton.* projects in parallel where references allow.
      - name: Restore
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        run: msbuild /m "Scripts/Build/canary.proj" /t:Restore /p:Configuration=Canary /p:Platform="Any CPU" /p:UseArtifactsOutput=true

      - name: Build Canary
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        run: msbuild /m "Scripts/Build/canary.proj" /t:Build /restore /p:Configuration=Canary /p:Platform="Any CPU" /p:UseArtifactsOutput=true

      - name: Pack Canary
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        run: msbuild /m "Scripts/Build/canary.proj" /t:Pack /restore /p:Configuration=Canary /p:Platform="Any CPU" /p:UseArtifactsOutput=true

      - name: Save NuGet cache
        if: success() && steps.canary_release_kill_switch.outputs.enabled == 'true'
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: ~/.nuget/packages
          key: ${{ steps.nuget_cache_restore.outputs.cache-primary-key }}

      - name: Push NuGet Packages to nuget.org
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        id: push_nuget
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not $env:NUGET_API_KEY) {
            Write-Warning "NUGET_API_KEY not set - skipping NuGet push"
            echo "packages_published=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $packageCandidates = @(
            "artifacts/packages/Canary/*.nupkg",
            "Bin/Packages/Canary/*.nupkg"
          )
          $packages = @(Get-ChildItem -Path $packageCandidates -ErrorAction SilentlyContinue | Sort-Object FullName -Unique)
          $publishedAny = $false
          $repoRoot = if ($null -ne $env:GITHUB_WORKSPACE -and $env:GITHUB_WORKSPACE -ne '') { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          . (Join-Path $repoRoot 'Scripts/CI/StandardToolkitNupkgGuard.ps1')
          $standardToolkitNupkgSizeGateFailed = $false

          if ($packages) {
            foreach ($package in $packages) {
              if (-not (Test-StandardToolkitNupkgPushAllowed -Package $package)) {
                $standardToolkitNupkgSizeGateFailed = $true
                continue
              }
              Write-Output "Pushing package: $($package.Name)"
              try {
                $output = dotnet nuget push "$($package.FullName)" --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate 2>&1 | Out-String
                Write-Output $output
                if ($output -notmatch "already exists" -and $output -notmatch "was not pushed") {
                  $publishedAny = $true
                  Write-Host "Package $($package.Name) was published"
                } else {
                  Write-Host "Package $($package.Name) already exists - skipped"
                }
              } catch {
                Write-Warning "Failed to push $($package.Name): $_"
              }
            }
          } else {
            Write-Output "No NuGet packages found to push"
          }

          if ($standardToolkitNupkgSizeGateFailed) {
            exit 1
          }

          echo "packages_published=$publishedAny" >> $env:GITHUB_OUTPUT
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          STANDARD_TOOLKIT_MIN_NUPKG_MB: ${{ vars.STANDARD_TOOLKIT_MIN_NUPKG_MB }}

      - name: Get Version
        if: steps.canary_release_kill_switch.outputs.enabled == 'true'
        id: get_version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = $null
          $proj = 'Source/Krypton Components/Krypton.Toolkit/Krypton.Toolkit 2022.csproj'
          $msbuildConfig = 'Canary'

          try {
            $evaluated = (& dotnet msbuild "$proj" -getProperty:Version -p:Configuration=$msbuildConfig -nologo -v:q).Trim()
            if ($evaluated) {
              if ($evaluated -match '^[1-9]\d{2,}\.\d+\.\d+\.\d+$') {
                $version = $evaluated
                Write-Host "Got version from MSBuild: $version"
              } else {
                Write-Warning "Ignoring unexpected MSBuild version '$evaluated'."
              }
            }
          } catch {
            Write-Host "Could not read version from MSBuild: $_"
          }

          if (-not $version) {
            try {
              $dllRelativePaths = @(
                "artifacts/bin/$msbuildConfig/net48/Krypton.Toolkit.dll",
                "Bin/$msbuildConfig/net48/Krypton.Toolkit.dll"
              )
              $dllPath = $null
              foreach ($p in $dllRelativePaths) {
                if (Test-Path -LiteralPath $p) { $dllPath = Get-Item -LiteralPath $p; break }
              }
              if (-not $dllPath) { throw "Krypton.Toolkit.dll not found under artifacts or Bin." }
              $assemblyVersion = [System.Reflection.AssemblyName]::GetAssemblyName($dllPath.FullName).Version
              $assemblyVersionText = $assemblyVersion.ToString()
              if ($assemblyVersionText -match '^[1-9]\d{2,}\.\d+\.\d+\.\d+$') {
                $version = $assemblyVersionText
                Write-Host "Got version from assembly: $version"
              } else {
                Write-Warning "Ignoring unexpected assembly version '$assemblyVersionText' from $($dllPath.FullName)."
              }
            } catch {
              Write-Host "Could not read version from assembly: $_"
            }
          }

          if (-not $version) {
            Write-Warning "Version not found, using fallback."
            $version = "100.25.1.1"
          }

          Write-Host "Final determined version: $version"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=v$version-canary" >> $env:GITHUB_OUTPUT

      - name: Announce Canary Release on Discord
        # Kill switch check
        if: steps.canary_release_kill_switch.outputs.enabled == 'true' && steps.push_nuget.outputs.packages_published == 'True'
        shell: pwsh
        run: |
          if (-not $env:DISCORD_WEBHOOK_CANARY) {
            Write-Warning "DISCORD_WEBHOOK_CANARY not set - skipping Discord notification"
            exit 0
          }

          $payload = @{
            embeds = @(
              @{
                title = "🐤 Krypton Toolkit Canary Release"
                description = "A new canary pre-release is now available for early testing!"
                color = 16776960
                fields = @(
                  @{
                    name = "📌 Version"
                    value = "``${{ steps.get_version.outputs.version }}``"
                    inline = $true
                  }
                  @{
                    name = "📦 NuGet Packages"
                    value = "• [Krypton.Toolkit.Canary](https://www.nuget.org/packages/Krypton.Toolkit.Canary)`n• [Krypton.Ribbon.Canary](https://www.nuget.org/packages/Krypton.Ribbon.Canary)`n• [Krypton.Navigator.Canary](https://www.nuget.org/packages/Krypton.Navigator.Canary)`n• [Krypton.Workspace.Canary](https://www.nuget.org/packages/Krypton.Workspace.Canary)`n• [Krypton.Docking.Canary](https://www.nuget.org/packages/Krypton.Docking.Canary)`n• [Krypton.Standard.Toolkit.Canary](https://www.nuget.org/packages/Krypton.Standard.Toolkit.Canary)"
                    inline = $false
                  }
                  @{
                    name = "🎯 Target Frameworks"
                    value = "• .NET Framework 4.7.2`n• .NET Framework 4.8`n• .NET Framework 4.8.1`n• .NET 8.0`n• .NET 9.0`n• .NET 10.0`n• .NET 11.0"
                    inline = $false
                  }
                  @{
                    name = "📄 Release Notes"
                    value = "[View Changelog](https://github.com/Krypton-Suite/Standard-Toolkit/blob/canary/Documents/Changelog/Changelog.md)"
                    inline = $false
                  }
                )
                footer = @{
                  text = "Released"
                }
                timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffZ")
              }
            )
          } | ConvertTo-Json -Depth 10

          Invoke-RestMethod -Uri "${{ secrets.DISCORD_WEBHOOK_CANARY }}" -Method Post -Body $payload -ContentType "application/json"
        env:
          DISCORD_WEBHOOK_CANARY: ${{ secrets.DISCORD_WEBHOOK_CANARY }}
