#
# KILL-SWITCH: To disable this workflow, set repository variable NIGHTLY_DISABLED=true
# Location: Repository Settings → Secrets and variables → Actions → Variables tab
# To re-enable: Set NIGHTLY_DISABLED=false or delete the variable

name: Nightly Release

permissions:
  contents: read

on:
  schedule:
    # Run nightly build automatically at midnight UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual triggering for testing

jobs:
  nightly:
    runs-on: windows-2025-vs2026
    environment: production  # Requires approval before publishing

    concurrency:
      group: nightly-alpha
      cancel-in-progress: true

    steps:
      # Nightly Release kill switch
      - name: Nightly Release Kill Switch Check
        id: nightly_release_kill_switch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $disabled = '${{ vars.NIGHTLY_DISABLED }}'

          if ($disabled -eq 'true') {
            Write-Host "::warning:: Nightly Release workflow is currently DISABLED via kill switch (NIGHTLY_DISABLED=true)"
            Write-Host "To re-enable: Go to Repository Settings -> Secrets and Variables -> Actions -> Variables -> Set NIGHTLY_DISABLED to 'false'."
            echo "enabled=false" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Nightly Release kill switch check has passed, continuing..."
            echo "enabled=true" >> $env:GITHUB_OUTPUT
          }

      - name: Security - Verify Repository
        # Kill switch check
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true'
        shell: pwsh
        env:
          EXPECTED_REPOSITORY: ${{ vars.EXPECTED_REPOSITORY }}
        run: |
          $ErrorActionPreference = 'Stop'
          $expectedRepository = $env:EXPECTED_REPOSITORY
          if ([string]::IsNullOrWhiteSpace($expectedRepository)) {
            $expectedRepository = 'Krypton-Suite/Standard-Toolkit'
          }
          if ($env:GITHUB_REPOSITORY -ne $expectedRepository) {
            Write-Error "Security: Invalid repository '$env:GITHUB_REPOSITORY'. This workflow should only run on $expectedRepository"
            exit 1
          }
          Write-Host "✓ Repository verified: $env:GITHUB_REPOSITORY"

      - name: Security - Verify Branch
        # Kill switch check
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # This workflow checks out alpha, so verify we're authorized to do so
          $allowedRefs = @('refs/heads/alpha', 'refs/heads/master', 'refs/heads/main')
          if ($env:GITHUB_REF -notin $allowedRefs) {
            Write-Error "Security: Workflow triggered from unauthorized branch '$env:GITHUB_REF'"
            exit 1
          }
          Write-Host "✓ Branch verified: $env:GITHUB_REF"

      - name: Checkout
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true'
        uses: actions/checkout@v7
        with:
          ref: alpha
          fetch-depth: 0

      # Nightly always builds alpha; the workflow file may land before Populate-WebView2.ps1 is merged to alpha.
      - name: Checkout WebView2 CI script overlay
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          sparse-checkout: Scripts/CI/Populate-WebView2.ps1
          sparse-checkout-cone-mode: true
          path: _ci-overlay

      - name: Ensure WebView2 CI script
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dest = Join-Path $env:GITHUB_WORKSPACE 'Scripts/CI/Populate-WebView2.ps1'
          if (Test-Path -LiteralPath $dest) {
            Write-Host 'WebView2 CI script already present on checked-out branch.'
            exit 0
          }
          $src = Join-Path $env:GITHUB_WORKSPACE '_ci-overlay/Scripts/CI/Populate-WebView2.ps1'
          if (-not (Test-Path -LiteralPath $src)) {
            Write-Error @"
          Scripts/CI/Populate-WebView2.ps1 is missing on alpha and on workflow ref ($env:GITHUB_SHA).
          Merge Scripts/CI/Populate-WebView2.ps1 into alpha in the same change set as these workflow updates.
          "@
          }
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $dest) | Out-Null
          Copy-Item -LiteralPath $src -Destination $dest -Force
          Write-Host 'Copied WebView2 CI script from workflow ref onto alpha checkout.'

      - name: Check for changes in last 24 hours
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true'
        id: check_changes
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Get commits from last 24 hours on alpha branch
          $yesterday = (Get-Date).AddDays(-1).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss")
          $commitCount = git rev-list --count --since="$yesterday" alpha

          Write-Host "Commits in last 24 hours: $commitCount"

          if ([int]$commitCount -gt 0) {
            Write-Host "Changes detected - proceeding with nightly build"
            echo "has_changes=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No changes detected - skipping nightly build"
            echo "has_changes=false" >> $env:GITHUB_OUTPUT
          }

      - name: Skip notification
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'false'
        run: |
          Write-Host "::notice::No commits in the last 24 hours. Skipping nightly build and publish."

      # .NET 9 and 10; .NET 11 for net11.0-windows (DOTNET_PREVIEW_SETUP_VERSION when set, else 11.0.x).
      - name: Setup .NET (9 and 10)
        # Kill switch check
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Setup .NET 11 (stable)
        id: setup_dotnet11_stable_nightly
        continue-on-error: true
        # Kill switch check
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ vars.DOTNET_PREVIEW_SETUP_VERSION != '' && vars.DOTNET_PREVIEW_SETUP_VERSION || '11.0.x' }}

      - name: Setup .NET 11 (preview fallback)
        # Kill switch check
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.setup_dotnet11_stable_nightly.outcome == 'failure'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ vars.DOTNET_PREVIEW_SETUP_VERSION != '' && vars.DOTNET_PREVIEW_SETUP_VERSION || '11.0.x' }}
          dotnet-quality: preview

      # Preview .NET SDK. USE_DOTNET_PREVIEW=false skips preview SDK; global.json step uses stable SDK.
      - name: Setup .NET Preview
        # Kill switch check
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && vars.USE_DOTNET_PREVIEW != 'false'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ vars.DOTNET_PREVIEW_SETUP_VERSION }}
          dotnet-quality: preview

      # Pin sdk.version for CI; preview band follows USE_DOTNET_PREVIEW; stable path prefers .NET 11 for net11.0-windows TFMs.
      - name: Pin SDK via global.json
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'true'
        env:
          DOTNET_PREVIEW_SDK_BAND: ${{ vars.DOTNET_PREVIEW_SDK_BAND }}
          USE_DOTNET_PREVIEW: ${{ vars.USE_DOTNET_PREVIEW }}
        run: |
          $ErrorActionPreference = 'Stop'
          function Get-ListedSdkVersion([string]$Pattern) {
            $hit = dotnet --list-sdks | Select-String $Pattern | Select-Object -Last 1
            if (-not $hit) { return $null }
            $line = $hit.Line.TrimEnd()
            if ($line -match '^(\d+\.\d+\.\d+)\s') { return $Matches[1] }
            return (($line -split '\s+', 2)[0])
          }

          $usePreview = $env:USE_DOTNET_PREVIEW -ne 'false'
          $sdkVersion = $null
          if (-not $usePreview) {
            $sdkVersion = Get-ListedSdkVersion '11.0'
            if (-not $sdkVersion) { $sdkVersion = Get-ListedSdkVersion '10.0' }
            if (-not $sdkVersion) { $sdkVersion = Get-ListedSdkVersion '9.0' }
          } else {
            if (-not $env:DOTNET_PREVIEW_SDK_BAND) {
              Write-Error 'DOTNET_PREVIEW_SDK_BAND is not set (repository variable).'
            }
            $sdkVersion = Get-ListedSdkVersion $env:DOTNET_PREVIEW_SDK_BAND
            if (-not $sdkVersion) {
              $sdkVersion = Get-ListedSdkVersion '11.0'
            }
            if (-not $sdkVersion) {
              $sdkVersion = Get-ListedSdkVersion '10.0'
            }
          }
          if (-not $sdkVersion) {
            Write-Error 'Could not resolve an SDK version for global.json.'
          }
          Write-Host "Using SDK $sdkVersion"
          @"
          {
            "sdk": {
              "version": "$sdkVersion",
              "rollForward": "latestFeature"
            }
          }
          "@ | Out-File -Encoding utf8 global.json

      - name: Setup MSBuild
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'true'
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Setup NuGet
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'true'
        uses: NuGet/setup-nuget@v4

      - name: Cache NuGet
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'true'
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Prerelease WebView2 required for net11.0-windows; stable packages do not support .NET 11 yet.
      - name: Resolve WebView2 version
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'true'
        id: webview2_version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $repoRoot = if ($env:GITHUB_WORKSPACE) { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          & (Join-Path $repoRoot 'Scripts/CI/Populate-WebView2.ps1') -Prerelease -ResolveVersionOnly -WriteGitHubOutputVersion

      - name: Restore WebView2 cache
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'true'
        id: webview2_cache_restore
        uses: actions/cache/restore@v6
        continue-on-error: true
        with:
          path: ${{ runner.temp }}/webview2
          key: webview2-${{ runner.os }}-${{ steps.webview2_version.outputs.version }}
          restore-keys: |
            webview2-${{ runner.os }}-

      - name: Populate WebView2 (Preview)
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'true'
        shell: pwsh
        env:
          WEBVIEW2_VERSION: ${{ steps.webview2_version.outputs.version }}
        run: |
          $ErrorActionPreference = 'Stop'
          $repoRoot = if ($env:GITHUB_WORKSPACE) { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          & (Join-Path $repoRoot 'Scripts/CI/Populate-WebView2.ps1') -Prerelease -Version $env:WEBVIEW2_VERSION

      - name: Save WebView2 cache
        if: success() && steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'true'
        uses: actions/cache/save@v6
        continue-on-error: true
        with:
          path: ${{ runner.temp }}/webview2
          key: ${{ steps.webview2_cache_restore.outputs.cache-primary-key }}

      # /m: multi-processor MSBuild (all runner CPUs). nightly.proj uses BuildInParallel; project references still order builds.
      - name: Restore
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'true'
        run: msbuild /m "Scripts/Build/nightly.proj" /t:Restore /p:Configuration=Nightly /p:Platform="Any CPU" /p:UseArtifactsOutput=true

      - name: Build Nightly
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'true'
        run: msbuild /m "Scripts/Build/nightly.proj" /t:Build /restore /p:Configuration=Nightly /p:Platform="Any CPU" /p:UseArtifactsOutput=true

      - name: Pack Nightly
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'true'
        run: msbuild /m "Scripts/Build/nightly.proj" /t:Pack /restore /p:Configuration=Nightly /p:Platform="Any CPU" /p:UseArtifactsOutput=true

      # Verify Krypton.Interop is present in NuGet packages (V110+ only)
      - name: Resolve Krypton toolkit major version
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'true'
        id: krypton_major_version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $repoRoot = if ($env:GITHUB_WORKSPACE) { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          . (Join-Path $repoRoot 'Scripts/CI/Test-KryptonInteropInPackages.ps1')
          $major = Get-KryptonToolkitMajorVersion -Configuration Nightly
          echo "major=$major" >> $env:GITHUB_OUTPUT

      - name: Verify Krypton.Interop in NuGet packages
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'true' && steps.krypton_major_version.outputs.major >= 110
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $repoRoot = if ($env:GITHUB_WORKSPACE) { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          . (Join-Path $repoRoot 'Scripts/CI/Test-KryptonInteropInPackages.ps1')
          Test-KryptonInteropInPackages -Configuration Nightly -MinimumMajorVersion 110 -SkipIfInteropProjectMissing

      - name: Push NuGet Packages to nuget.org
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'true'
        id: push_nuget
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not $env:NUGET_API_KEY) {
            Write-Warning "NUGET_API_KEY not set - skipping NuGet push"
            echo "packages_published=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $packageCandidates = @(
            "artifacts/packages/Nightly/*.nupkg",
            "Bin/Packages/Nightly/*.nupkg"
          )
          $packages = @(Get-ChildItem -Path $packageCandidates -ErrorAction SilentlyContinue | Sort-Object FullName -Unique)
          $publishedAny = $false
          $repoRoot = if ($null -ne $env:GITHUB_WORKSPACE -and $env:GITHUB_WORKSPACE -ne '') { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          . (Join-Path $repoRoot 'Scripts/CI/StandardToolkitNupkgGuard.ps1')
          $standardToolkitNupkgSizeGateFailed = $false

          if ($packages) {
            foreach ($package in $packages) {
              if (-not (Test-StandardToolkitNupkgPushAllowed -Package $package)) {
                $standardToolkitNupkgSizeGateFailed = $true
                continue
              }
              Write-Output "Pushing package: $($package.Name)"
              try {
                $output = dotnet nuget push "$($package.FullName)" --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate 2>&1 | Out-String
                Write-Output $output
                # Check if package was actually pushed (not skipped)
                if ($output -notmatch "already exists" -and $output -notmatch "was not pushed") {
                  $publishedAny = $true
                  Write-Host "Package $($package.Name) was published"
                } else {
                  Write-Host "Package $($package.Name) already exists - skipped"
                }
              } catch {
                Write-Warning "Failed to push $($package.Name): $_"
              }
            }
          } else {
            Write-Output "No NuGet packages found to push"
          }

          if ($standardToolkitNupkgSizeGateFailed) {
            exit 1
          }

          echo "packages_published=$publishedAny" >> $env:GITHUB_OUTPUT
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          STANDARD_TOOLKIT_MIN_NUPKG_MB: ${{ vars.STANDARD_TOOLKIT_MIN_NUPKG_MB }}

      - name: Get Version
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.check_changes.outputs.has_changes == 'true'
        id: get_version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = $null
          $proj = 'Source/Krypton Components/Krypton.Toolkit/Krypton.Toolkit 2022.csproj'
          $msbuildConfig = 'Nightly'

          # Primary source: built Krypton.Toolkit.dll assembly version.
          try {
            $dllRelativePaths = @(
              "artifacts/bin/$msbuildConfig/net48/Krypton.Toolkit.dll",
              "Bin/$msbuildConfig/net48/Krypton.Toolkit.dll",
              "Bin/Nightly/net48/Krypton.Toolkit.dll"
            )
            $dllPath = $null
            foreach ($p in $dllRelativePaths) {
              if (Test-Path -LiteralPath $p) { $dllPath = Get-Item -LiteralPath $p; break }
            }

            if (-not $dllPath) {
              $searchRoots = @("artifacts/bin", "Bin/$msbuildConfig", "Bin/Nightly", "Bin")
              foreach ($root in $searchRoots) {
                if (Test-Path -LiteralPath $root) {
                  $candidate = Get-ChildItem -Path $root -Recurse -Filter "Krypton.Toolkit.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
                  if ($candidate) { $dllPath = $candidate; break }
                }
              }
            }

            if (-not $dllPath) { throw "Krypton.Toolkit.dll not found under artifacts or Bin." }
            $assemblyVersion = [System.Reflection.AssemblyName]::GetAssemblyName($dllPath.FullName).Version
            $assemblyVersionText = $assemblyVersion.ToString()
            if ($assemblyVersionText -match '^[1-9]\d{2,}\.\d+\.\d+\.\d+$') {
              $version = $assemblyVersionText
              Write-Host "Got version from assembly: $version ($($dllPath.FullName))"
            } else {
              Write-Warning "Ignoring unexpected assembly version '$assemblyVersionText' from $($dllPath.FullName)."
            }
          } catch {
            Write-Host "Could not read version from assembly: $_"
          }

          # Backup source: evaluated MSBuild Version when assembly probing fails.
          if (-not $version) {
            try {
              $evaluated = (& dotnet msbuild "$proj" -getProperty:Version -p:Configuration=$msbuildConfig -nologo -v:q).Trim()
              if ($evaluated) {
                if ($evaluated -match '^[1-9]\d{2,}\.\d+\.\d+\.\d+$') {
                  $version = $evaluated
                  Write-Host "Got version from MSBuild fallback: $version"
                } else {
                  Write-Warning "Ignoring unexpected MSBuild version '$evaluated'."
                }
              }
            } catch {
              Write-Host "Could not read version from MSBuild: $_"
            }
          }

          if (-not $version) {
            Write-Warning "Version not found, using fallback."
            $version = "100.25.1.1"
          }

          Write-Host "Final determined version: $version"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=v$version-nightly" >> $env:GITHUB_OUTPUT

      - name: Announce Nightly Release on Discord
        if: steps.nightly_release_kill_switch.outputs.enabled == 'true' && steps.push_nuget.outputs.packages_published == 'True'
        shell: pwsh
        run: |
          if (-not $env:DISCORD_WEBHOOK_NIGHTLY) {
            Write-Warning "DISCORD_WEBHOOK_NIGHTLY not set - skipping Discord notification"
            exit 0
          }

          $payload = @{
            embeds = @(
              @{
                title = "🚀 Krypton Toolkit Nightly Release"
                description = "A new nightly build is now available for bleeding-edge testing!"
                color = 10181046
                fields = @(
                  @{
                    name = "📌 Version"
                    value = "``${{ steps.get_version.outputs.version }}``"
                    inline = $true
                  }
                  @{
                    name = "📦 NuGet Packages"
                    value = "• [Krypton.Toolkit.Nightly](https://www.nuget.org/packages/Krypton.Toolkit.Nightly)`n• [Krypton.Ribbon.Nightly](https://www.nuget.org/packages/Krypton.Ribbon.Nightly)`n• [Krypton.Navigator.Nightly](https://www.nuget.org/packages/Krypton.Navigator.Nightly)`n• [Krypton.Workspace.Nightly](https://www.nuget.org/packages/Krypton.Workspace.Nightly)`n• [Krypton.Docking.Nightly](https://www.nuget.org/packages/Krypton.Docking.Nightly)`n• [Krypton.Standard.Toolkit.Nightly](https://www.nuget.org/packages/Krypton.Standard.Toolkit.Nightly)"
                    inline = $false
                  }
                  @{
                    name = "🎯 Target Frameworks"
                    value = "• .NET Framework 4.7.2`n• .NET Framework 4.8`n• .NET Framework 4.8.1`n• .NET 8.0`n• .NET 9.0`n• .NET 10.0`n• .NET 11.0"
                    inline = $false
                  }
                  @{
                    name = "📄 Changelog"
                    value = "• [Latest Changelog](https://github.com/Krypton-Suite/Standard-Toolkit/blob/alpha/Documents/Changelog/Changelog.md)"
                    inline = $false
                  }
                )
                footer = @{
                  text = "Released"
                }
                timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffZ")
              }
            )
          } | ConvertTo-Json -Depth 10

          Invoke-RestMethod -Uri $env:DISCORD_WEBHOOK_NIGHTLY -Method Post -Body $payload -ContentType "application/json"
        env:
          DISCORD_WEBHOOK_NIGHTLY: ${{ secrets.DISCORD_WEBHOOK_NIGHTLY }}
