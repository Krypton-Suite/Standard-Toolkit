name: Build

permissions:
  contents: read

on:
  pull_request:
    branches: ['**']
    types: [opened, synchronize, reopened]
  push:
    branches:
      - master
      - alpha
      - canary
      - gold
      - V105-LTS
    paths-ignore: ['.git*', '.vscode']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025-vs2026
    if: github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # .NET 9 and 10 always; .NET 11 — DOTNET_PREVIEW_SETUP_VERSION when set, else 11.0.x (stable attempt, then preview).
      - name: Setup .NET (9 and 10)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Setup .NET 11 (stable)
        id: setup_dotnet11_stable
        continue-on-error: true
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ vars.DOTNET_PREVIEW_SETUP_VERSION != '' && vars.DOTNET_PREVIEW_SETUP_VERSION || '11.0.x' }}

      - name: Setup .NET 11 (preview fallback)
        if: steps.setup_dotnet11_stable.outcome == 'failure'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ vars.DOTNET_PREVIEW_SETUP_VERSION != '' && vars.DOTNET_PREVIEW_SETUP_VERSION || '11.0.x' }}
          dotnet-quality: preview

      # Optional extra preview SDK (repo variable). USE_DOTNET_PREVIEW=false skips; global.json pins latest installed band below.
      - name: Setup .NET Preview
        if: vars.USE_DOTNET_PREVIEW != 'false'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ vars.DOTNET_PREVIEW_SETUP_VERSION }}
          dotnet-quality: preview

      # Pin sdk.version to newest installed 11.x / 10.x / 9.x for reproducible CI (must support all TargetFrameworks).
      - name: Pin SDK via global.json
        run: |
          $ErrorActionPreference = 'Stop'
          function Get-ListedSdkVersion([string]$Pattern) {
            $hit = dotnet --list-sdks | Select-String $Pattern | Select-Object -Last 1
            if (-not $hit) { return $null }
            $line = $hit.Line.TrimEnd()
            if ($line -match '^(\d+\.\d+\.\d+)\s') { return $Matches[1] }
            return (($line -split '\s+', 2)[0])
          }
          $sdkVersion = Get-ListedSdkVersion '11.0'
          if (-not $sdkVersion) { $sdkVersion = Get-ListedSdkVersion '10.0' }
          if (-not $sdkVersion) { $sdkVersion = Get-ListedSdkVersion '9.0' }
          if (-not $sdkVersion) {
            Write-Error 'Could not resolve an SDK version for global.json.'
          }
          Write-Host "Using SDK $sdkVersion"
          @"
          {
            "sdk": {
              "version": "$sdkVersion",
              "rollForward": "latestFeature"
            }
          }
          "@ | Out-File -Encoding utf8 global.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Cache NuGet
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # TODO: Remove the step-level `if` below in November 2026 so WebView2 runs on all branches.
      # Prerelease WebView2 required for net11.0-windows on alpha/canary; stable packages do not support .NET 11 yet.
      - name: Resolve WebView2 version
        if: github.ref == 'refs/heads/alpha' || github.ref == 'refs/heads/canary' || github.head_ref == 'alpha' || github.head_ref == 'canary'
        id: webview2_version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $repoRoot = if ($env:GITHUB_WORKSPACE) { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          & (Join-Path $repoRoot 'Scripts/CI/Populate-WebView2.ps1') -Prerelease -ResolveVersionOnly -WriteGitHubOutputVersion

      - name: Restore WebView2 cache
        if: github.ref == 'refs/heads/alpha' || github.ref == 'refs/heads/canary' || github.head_ref == 'alpha' || github.head_ref == 'canary'
        id: webview2_cache_restore
        uses: actions/cache/restore@v6
        continue-on-error: true
        with:
          path: ${{ runner.temp }}/webview2
          key: webview2-${{ runner.os }}-${{ steps.webview2_version.outputs.version }}
          restore-keys: |
            webview2-${{ runner.os }}-

      - name: Populate WebView2 (Preview)
        if: github.ref == 'refs/heads/alpha' || github.ref == 'refs/heads/canary' || github.head_ref == 'alpha' || github.head_ref == 'canary'
        shell: pwsh
        env:
          WEBVIEW2_VERSION: ${{ steps.webview2_version.outputs.version }}
        run: |
          $ErrorActionPreference = 'Stop'
          $repoRoot = if ($env:GITHUB_WORKSPACE) { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          & (Join-Path $repoRoot 'Scripts/CI/Populate-WebView2.ps1') -Prerelease -Version $env:WEBVIEW2_VERSION

      - name: Save WebView2 cache
        if: success() && (github.ref == 'refs/heads/alpha' || github.ref == 'refs/heads/canary' || github.head_ref == 'alpha' || github.head_ref == 'canary')
        uses: actions/cache/save@v6
        continue-on-error: true
        with:
          path: ${{ runner.temp }}/webview2
          key: ${{ steps.webview2_cache_restore.outputs.cache-primary-key }}

      # Match nightly.proj: Release + TFMs=all so TargetFrameworks / package graphs align (avoids CS7069 / prune mismatches).
      # UseArtifactsOutput must match MSBuild Build (avoids NETSDK1005 under artifacts/obj).
      - name: Restore
        run: dotnet restore "Source/Krypton Components/Krypton Toolkit Suite 2022 - VS2022.slnx" -p:Configuration=Release -p:TFMs=all -p:UseArtifactsOutput=true

      # /m: multi-processor MSBuild; nightly.proj sets BuildInParallel on the Krypton.* graph.
      - name: Build
        run: msbuild /m "Scripts/Build/nightly.proj" /t:Rebuild /restore /p:Configuration=Release /p:Platform="Any CPU" /p:UseArtifactsOutput=true

  release:
    runs-on: windows-2025-vs2026
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # .NET 9 and 10 always; .NET 11 — DOTNET_PREVIEW_SETUP_VERSION when set, else 11.0.x (same resolution as build job).
      - name: Setup .NET (9 and 10)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Setup .NET 11 (stable)
        id: setup_dotnet11_stable_release
        continue-on-error: true
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ vars.DOTNET_PREVIEW_SETUP_VERSION != '' && vars.DOTNET_PREVIEW_SETUP_VERSION || '11.0.x' }}

      - name: Setup .NET 11 (preview fallback)
        if: steps.setup_dotnet11_stable_release.outcome == 'failure'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ vars.DOTNET_PREVIEW_SETUP_VERSION != '' && vars.DOTNET_PREVIEW_SETUP_VERSION || '11.0.x' }}
          dotnet-quality: preview

      # Pin sdk.version to newest installed 11.x / 10.x / 9.x for reproducible CI (must support all TargetFrameworks).
      - name: Pin SDK via global.json
        run: |
          $ErrorActionPreference = 'Stop'
          function Get-ListedSdkVersion([string]$Pattern) {
            $hit = dotnet --list-sdks | Select-String $Pattern | Select-Object -Last 1
            if (-not $hit) { return $null }
            $line = $hit.Line.TrimEnd()
            if ($line -match '^(\d+\.\d+\.\d+)\s') { return $Matches[1] }
            return (($line -split '\s+', 2)[0])
          }
          $sdkVersion = Get-ListedSdkVersion '11.0'
          if (-not $sdkVersion) { $sdkVersion = Get-ListedSdkVersion '10.0' }
          if (-not $sdkVersion) { $sdkVersion = Get-ListedSdkVersion '9.0' }
          if (-not $sdkVersion) {
            Write-Error 'Could not resolve an SDK version for global.json.'
          }
          Write-Host "Using SDK $sdkVersion"
          @"
          {
            "sdk": {
              "version": "$sdkVersion",
              "rollForward": "latestFeature"
            }
          }
          "@ | Out-File -Encoding utf8 global.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Cache NuGet
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # TODO: Remove the step-level `if` below in November 2026 so WebView2 runs on all branches.
      # Prerelease WebView2 required for net11.0-windows on alpha/canary; stable packages do not support .NET 11 yet.
      - name: Resolve WebView2 version
        if: github.ref == 'refs/heads/alpha' || github.ref == 'refs/heads/canary' || github.head_ref == 'alpha' || github.head_ref == 'canary'
        id: webview2_version_release
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $repoRoot = if ($env:GITHUB_WORKSPACE) { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          & (Join-Path $repoRoot 'Scripts/CI/Populate-WebView2.ps1') -Prerelease -ResolveVersionOnly -WriteGitHubOutputVersion

      - name: Restore WebView2 cache
        if: github.ref == 'refs/heads/alpha' || github.ref == 'refs/heads/canary' || github.head_ref == 'alpha' || github.head_ref == 'canary'
        id: webview2_cache_restore_release
        uses: actions/cache/restore@v6
        continue-on-error: true
        with:
          path: ${{ runner.temp }}/webview2
          key: webview2-${{ runner.os }}-${{ steps.webview2_version_release.outputs.version }}
          restore-keys: |
            webview2-${{ runner.os }}-

      - name: Populate WebView2 (Preview)
        if: github.ref == 'refs/heads/alpha' || github.ref == 'refs/heads/canary' || github.head_ref == 'alpha' || github.head_ref == 'canary'
        shell: pwsh
        env:
          WEBVIEW2_VERSION: ${{ steps.webview2_version_release.outputs.version }}
        run: |
          $ErrorActionPreference = 'Stop'
          $repoRoot = if ($env:GITHUB_WORKSPACE) { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          & (Join-Path $repoRoot 'Scripts/CI/Populate-WebView2.ps1') -Prerelease -Version $env:WEBVIEW2_VERSION

      - name: Save WebView2 cache
        if: success() && (github.ref == 'refs/heads/alpha' || github.ref == 'refs/heads/canary' || github.head_ref == 'alpha' || github.head_ref == 'canary')
        uses: actions/cache/save@v6
        continue-on-error: true
        with:
          path: ${{ runner.temp }}/webview2
          key: ${{ steps.webview2_cache_restore_release.outputs.cache-primary-key }}

      # UseArtifactsOutput must match Build/Pack so project.assets.json lands under artifacts/obj (avoids NETSDK1005).
      - name: Restore
        run: msbuild /m "Scripts/Build/build.proj" /t:Restore /p:Configuration=Release /p:Platform="Any CPU" /p:UseArtifactsOutput=true /p:TFMs=all

      # /m: multi-processor MSBuild (all runner CPUs). build.proj orchestrates Krypton.* in parallel where references allow.
      - name: Build Release
        run: msbuild /m "Scripts/Build/build.proj" /t:Build /restore /p:Configuration=Release /p:Platform="Any CPU" /p:UseArtifactsOutput=true

      - name: Pack Release
        run: msbuild /m "Scripts/Build/build.proj" /t:Pack /restore /p:Configuration=Release /p:Platform="Any CPU" /p:UseArtifactsOutput=true /p:TFMs=all

      # Verify Krypton.Interop in NuGet packages (V110+ only)
      - name: Resolve Krypton toolkit major version
        id: krypton_major_version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $repoRoot = if ($env:GITHUB_WORKSPACE) { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          . (Join-Path $repoRoot 'Scripts/CI/Test-KryptonInteropInPackages.ps1')
          $major = Get-KryptonToolkitMajorVersion -Configuration Release
          echo "major=$major" >> $env:GITHUB_OUTPUT

      - name: Verify Krypton.Interop in NuGet packages
        if: steps.krypton_major_version.outputs.major >= 110
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $repoRoot = if ($env:GITHUB_WORKSPACE) { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          . (Join-Path $repoRoot 'Scripts/CI/Test-KryptonInteropInPackages.ps1')
          Test-KryptonInteropInPackages -Configuration Release -MinimumMajorVersion 110 -SkipIfInteropProjectMissing

      - name: Get Version
        id: get_version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = $null
          $proj = 'Source/Krypton Components/Krypton.Toolkit/Krypton.Toolkit 2022.csproj'
          $msbuildConfig = 'Release'

          # Primary source: built Krypton.Toolkit.dll assembly version.
          try {
            $dllRelativePaths = @(
              "artifacts/bin/$msbuildConfig/net48/Krypton.Toolkit.dll",
              "Bin/$msbuildConfig/net48/Krypton.Toolkit.dll"
            )
            $dllPath = $null
            foreach ($p in $dllRelativePaths) {
              if (Test-Path -LiteralPath $p) { $dllPath = Get-Item -LiteralPath $p; break }
            }

            if (-not $dllPath) {
              $searchRoots = @("artifacts/bin", "Bin/$msbuildConfig", "Bin")
              foreach ($root in $searchRoots) {
                if (Test-Path -LiteralPath $root) {
                  $candidate = Get-ChildItem -Path $root -Recurse -Filter "Krypton.Toolkit.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
                  if ($candidate) { $dllPath = $candidate; break }
                }
              }
            }

            if (-not $dllPath) { throw "Krypton.Toolkit.dll not found under artifacts or Bin." }
            $assemblyVersion = [System.Reflection.AssemblyName]::GetAssemblyName($dllPath.FullName).Version
            $assemblyVersionText = $assemblyVersion.ToString()
            if ($assemblyVersionText -match '^[1-9]\d{2,}\.\d+\.\d+\.\d+$') {
              $version = $assemblyVersionText
              Write-Host "Got version from assembly: $version ($($dllPath.FullName))"
            } else {
              Write-Warning "Ignoring unexpected assembly version '$assemblyVersionText' from $($dllPath.FullName)."
            }
          } catch {
            Write-Host "Could not read version from assembly: $_"
          }

          # Backup source: evaluated MSBuild Version when assembly probing fails.
          if (-not $version) {
            try {
              $evaluated = (& dotnet msbuild "$proj" -getProperty:Version -p:Configuration=$msbuildConfig -nologo -v:q).Trim()
              if ($evaluated) {
                if ($evaluated -match '^[1-9]\d{2,}\.\d+\.\d+\.\d+$') {
                  $version = $evaluated
                  Write-Host "Got version from MSBuild fallback: $version"
                } else {
                  Write-Warning "Ignoring unexpected MSBuild version '$evaluated'."
                }
              }
            } catch {
              Write-Host "Could not read version from MSBuild: $_"
            }
          }

          if (-not $version) {
            $version = "100.25.1.1"  # Fallback version
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=v$version" >> $env:GITHUB_OUTPUT
