name: Build

permissions:
  contents: read

on:
  pull_request:
    branches: ['**']
    types: [opened, synchronize, reopened]
  push:
    branches:
      - master
      - alpha
      - canary
      - gold
      - V105-LTS
    paths-ignore: ['.git*', '.vscode']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025-vs2026
    if: github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # .NET 9 and 10
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      # .NET 11 (Preview)
      - name: Setup .NET 11 (Preview)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 11.0.x
          dotnet-quality: preview

      # global.json dynamically generate (prefer stable SDKs for CI reproducibility)
      - name: Force .NET 10 SDK via global.json
        run: |
          $sdkVersion = (dotnet --list-sdks | Select-String "10.0").ToString().Split(" ")[0]
          if (-not $sdkVersion) {
            # Fallback to .NET 9 if .NET 10 is not available
            $sdkVersion = (dotnet --list-sdks | Select-String "9.0").ToString().Split(" ")[0]
          }
          Write-Output "Using SDK $sdkVersion"
          @"
          {
            "sdk": {
              "version": "$sdkVersion",
              "rollForward": "latestFeature"
            }
          }
          "@ | Out-File -Encoding utf8 global.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # TODO: Remove the step-level `if` below in November 2026 so WebView2 runs on all branches.
      - name: Populate WebView2 (latest)
        if: github.ref == 'refs/heads/alpha' || github.ref == 'refs/heads/canary' || github.head_ref == 'alpha' || github.head_ref == 'canary'
        shell: pwsh
        run: |
          $root = $env:GITHUB_WORKSPACE
          if (-not $root) { $root = (Get-Location).Path }
          $utilProj = Join-Path $root "Source\Krypton Components\Krypton.Utilities\Krypton.Utilities.csproj"
          $libDir = Join-Path $root "Source\Krypton Components\Krypton.Utilities\Lib\WebView2"
          if (-not (Test-Path $utilProj)) { Write-Error "Project not found: $utilProj"; exit 1 }
          if (-not (Test-Path $libDir)) { New-Item -ItemType Directory -Path $libDir -Force }
          $packageId = "Microsoft.Web.WebView2"
          # Use prerelease versions for alpha and canary branches to avoid .NET 11.0 requirement
          $usePrerelease = ($env:GITHUB_REF -eq 'refs/heads/alpha' -or $env:GITHUB_REF -eq 'refs/heads/canary')
          $prereleaseParam = if ($usePrerelease) { "true" } else { "false" }
          Write-Host "Using prerelease=$prereleaseParam for WebView2 SDK lookup"
          $latestVersion = $null
          try {
            $searchResponse = Invoke-RestMethod -Uri "https://azuresearch-usnc.nuget.org/query?q=$packageId&prerelease=$prereleaseParam&semVerLevel=2.0.0&take=1" -Method Get
            if ($searchResponse.data -and $searchResponse.data.Count -gt 0) { $latestVersion = $searchResponse.data[0].version }
          } catch {
            try {
              $response = Invoke-RestMethod -Uri "https://api.nuget.org/v3-flatcontainer/$packageId/index.json" -Method Get
              if ($usePrerelease) {
                # Include prerelease versions
                $allVersions = $response.versions | Where-Object { $_ -match '^\d+\.\d+\.\d+' }
                if ($allVersions) { $latestVersion = $allVersions | Sort-Object { [System.Version]($_ -replace '-.*', '') } -Descending | Select-Object -First 1 }
              } else {
                $stableVersions = $response.versions | Where-Object { $_ -notmatch '[-]' -and $_ -match '^\d+\.\d+\.\d+$' }
                if ($stableVersions) { $latestVersion = $stableVersions | Sort-Object { [System.Version]$_ } -Descending | Select-Object -First 1 }
              }
            } catch {}
          }
          if (-not $latestVersion) { $latestVersion = "1.0.3595.46" }
          Write-Host "Using WebView2 ($(if ($usePrerelease) { 'preview' } else { 'latest' })): $latestVersion"
          dotnet add "$utilProj" package $packageId --version $latestVersion
          dotnet restore "$utilProj"
          $nugetBase = Join-Path $env:USERPROFILE ".nuget\packages\microsoft.web.webview2\$latestVersion"
          @("Microsoft.Web.WebView2.Core.dll","Microsoft.Web.WebView2.WinForms.dll","WebView2Loader.dll") | ForEach-Object {
            $f = Get-ChildItem -Path $nugetBase -Recurse -Name $_ -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($f) { Copy-Item (Join-Path $nugetBase $f) $libDir -Force; Write-Host "Copied $_" }
          }
          [xml]$proj = Get-Content $utilProj
          $nodes = $proj.SelectNodes("//PackageReference[@Include='$packageId']")
          foreach ($node in $nodes) { $node.ParentNode.RemoveChild($node) | Out-Null }
          $proj.Save($utilProj)
          Write-Host "Removed temporary WebView2 PackageReference entries"

      # Match nightly.proj: Release + TFMs=all so TargetFrameworks / package graphs align (avoids CS7069 / prune mismatches).
      - name: Restore
        run: dotnet restore "Source/Krypton Components/Krypton Toolkit Suite 2022 - VS2022.slnx" -p:Configuration=Release -p:TFMs=all

      - name: Build
        run: msbuild "Scripts/Build/nightly.proj" /t:Rebuild /restore /p:Configuration=Release /p:Platform="Any CPU" /p:UseArtifactsOutput=true

  release:
    runs-on: windows-2025-vs2026
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # .NET 9 and 10
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      # global.json dynamically generate
      - name: Force .NET 10 SDK via global.json
        run: |
          $sdkVersion = (dotnet --list-sdks | Select-String "10.0").ToString().Split(" ")[0]
          Write-Output "Using SDK $sdkVersion"
          @"
          {
            "sdk": {
              "version": "$sdkVersion",
              "rollForward": "latestFeature"
            }
          }
          "@ | Out-File -Encoding utf8 global.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # TODO: Remove the step-level `if` below in November 2026 so WebView2 runs on all branches.
      - name: Populate WebView2 (latest)
        if: github.ref == 'refs/heads/alpha' || github.ref == 'refs/heads/canary' || github.head_ref == 'alpha' || github.head_ref == 'canary'
        shell: pwsh
        run: |
          $root = $env:GITHUB_WORKSPACE
          if (-not $root) { $root = (Get-Location).Path }
          $utilProj = Join-Path $root "Source\Krypton Components\Krypton.Utilities\Krypton.Utilities.csproj"
          $libDir = Join-Path $root "Source\Krypton Components\Krypton.Utilities\Lib\WebView2"
          if (-not (Test-Path $utilProj)) { Write-Error "Project not found: $utilProj"; exit 1 }
          if (-not (Test-Path $libDir)) { New-Item -ItemType Directory -Path $libDir -Force }
          $packageId = "Microsoft.Web.WebView2"
          # Use prerelease versions for alpha and canary branches to avoid .NET 11.0 requirement
          $usePrerelease = ($env:GITHUB_REF -eq 'refs/heads/alpha' -or $env:GITHUB_REF -eq 'refs/heads/canary')
          $prereleaseParam = if ($usePrerelease) { "true" } else { "false" }
          Write-Host "Using prerelease=$prereleaseParam for WebView2 SDK lookup"
          $latestVersion = $null
          try {
            $searchResponse = Invoke-RestMethod -Uri "https://azuresearch-usnc.nuget.org/query?q=$packageId&prerelease=$prereleaseParam&semVerLevel=2.0.0&take=1" -Method Get
            if ($searchResponse.data -and $searchResponse.data.Count -gt 0) { $latestVersion = $searchResponse.data[0].version }
          } catch {
            try {
              $response = Invoke-RestMethod -Uri "https://api.nuget.org/v3-flatcontainer/$packageId/index.json" -Method Get
              if ($usePrerelease) {
                # Include prerelease versions
                $allVersions = $response.versions | Where-Object { $_ -match '^\d+\.\d+\.\d+' }
                if ($allVersions) { $latestVersion = $allVersions | Sort-Object { [System.Version]($_ -replace '-.*', '') } -Descending | Select-Object -First 1 }
              } else {
                $stableVersions = $response.versions | Where-Object { $_ -notmatch '[-]' -and $_ -match '^\d+\.\d+\.\d+$' }
                if ($stableVersions) { $latestVersion = $stableVersions | Sort-Object { [System.Version]$_ } -Descending | Select-Object -First 1 }
              }
            } catch {}
          }
          if (-not $latestVersion) { $latestVersion = "1.0.3595.46" }
          Write-Host "Using WebView2 ($(if ($usePrerelease) { 'preview' } else { 'latest' })): $latestVersion"
          dotnet add "$utilProj" package $packageId --version $latestVersion
          dotnet restore "$utilProj"
          $nugetBase = Join-Path $env:USERPROFILE ".nuget\packages\microsoft.web.webview2\$latestVersion"
          @("Microsoft.Web.WebView2.Core.dll","Microsoft.Web.WebView2.WinForms.dll","WebView2Loader.dll") | ForEach-Object {
            $f = Get-ChildItem -Path $nugetBase -Recurse -Name $_ -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($f) { Copy-Item (Join-Path $nugetBase $f) $libDir -Force; Write-Host "Copied $_" }
          }
          [xml]$proj = Get-Content $utilProj
          $nodes = $proj.SelectNodes("//PackageReference[@Include='$packageId']")
          foreach ($node in $nodes) { $node.ParentNode.RemoveChild($node) | Out-Null }
          $proj.Save($utilProj)
          Write-Host "Removed temporary WebView2 PackageReference entries"

      - name: Restore
        run: dotnet restore "Source/Krypton Components/Krypton Toolkit Suite 2022 - VS2022.slnx" -p:Configuration=Release -p:TFMs=all

      - name: Build Release
        run: msbuild "Scripts/Build/build.proj" /t:Build /restore /p:Configuration=Release /p:Platform="Any CPU" /p:UseArtifactsOutput=true

      - name: Pack Release
        run: msbuild "Scripts/Build/build.proj" /t:Pack /restore /p:Configuration=Release /p:Platform="Any CPU" /p:UseArtifactsOutput=true

      - name: Get Version
        id: get_version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = $null
          $proj = 'Source/Krypton Components/Krypton.Toolkit/Krypton.Toolkit 2022.csproj'
          $msbuildConfig = 'Release'

          # Primary source: built Krypton.Toolkit.dll assembly version.
          try {
            $dllRelativePaths = @(
              "artifacts/bin/$msbuildConfig/net48/Krypton.Toolkit.dll",
              "Bin/$msbuildConfig/net48/Krypton.Toolkit.dll"
            )
            $dllPath = $null
            foreach ($p in $dllRelativePaths) {
              if (Test-Path -LiteralPath $p) { $dllPath = Get-Item -LiteralPath $p; break }
            }

            if (-not $dllPath) {
              $searchRoots = @("artifacts/bin", "Bin/$msbuildConfig", "Bin")
              foreach ($root in $searchRoots) {
                if (Test-Path -LiteralPath $root) {
                  $candidate = Get-ChildItem -Path $root -Recurse -Filter "Krypton.Toolkit.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
                  if ($candidate) { $dllPath = $candidate; break }
                }
              }
            }

            if (-not $dllPath) { throw "Krypton.Toolkit.dll not found under artifacts or Bin." }
            $assemblyVersion = [System.Reflection.AssemblyName]::GetAssemblyName($dllPath.FullName).Version
            $assemblyVersionText = $assemblyVersion.ToString()
            if ($assemblyVersionText -match '^[1-9]\d{2,}\.\d+\.\d+\.\d+$') {
              $version = $assemblyVersionText
              Write-Host "Got version from assembly: $version ($($dllPath.FullName))"
            } else {
              Write-Warning "Ignoring unexpected assembly version '$assemblyVersionText' from $($dllPath.FullName)."
            }
          } catch {
            Write-Host "Could not read version from assembly: $_"
          }

          # Backup source: evaluated MSBuild Version when assembly probing fails.
          if (-not $version) {
            try {
              $evaluated = (& dotnet msbuild "$proj" -getProperty:Version -p:Configuration=$msbuildConfig -nologo -v:q).Trim()
              if ($evaluated) {
                if ($evaluated -match '^[1-9]\d{2,}\.\d+\.\d+\.\d+$') {
                  $version = $evaluated
                  Write-Host "Got version from MSBuild fallback: $version"
                } else {
                  Write-Warning "Ignoring unexpected MSBuild version '$evaluated'."
                }
              }
            } catch {
              Write-Host "Could not read version from MSBuild: $_"
            }
          }

          if (-not $version) {
            $version = "100.25.1.1"  # Fallback version
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=v$version" >> $env:GITHUB_OUTPUT
