# Build and release Canary LTS NuGet packages. Only runs on the V105-LTS branch.
# KILL-SWITCH: Set repository variable CANARY_LTS_DISABLED=true to disable.
# Location: Repository Settings → Secrets and variables → Actions → Variables tab

name: Canary LTS Release

permissions:
  contents: read

on:
  push:
    branches:
      - V105-LTS
  workflow_dispatch:

jobs:
  canary-lts-release:
    runs-on: windows-2025-vs2026
    if: github.ref == 'refs/heads/V105-LTS' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Canary LTS Release Kill Switch Check
        id: canary_lts_kill_switch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $disabled = '${{ vars.CANARY_LTS_DISABLED }}'

          if ($disabled -eq 'true') {
            Write-Host "::warning:: Canary LTS Release workflow is currently DISABLED via kill switch (CANARY_LTS_DISABLED=true)"
            Write-Host "To re-enable: Go to Repository Settings -> Secrets and Variables -> Actions -> Variables -> Set CANARY_LTS_DISABLED to 'false'."
            echo "enabled=false" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Canary LTS Release kill switch check has passed, continuing..."
            echo "enabled=true" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout
        if: steps.canary_lts_kill_switch.outputs.enabled == 'true'
        uses: actions/checkout@v6

      - name: Setup .NET (9 and 10)
        if: steps.canary_lts_kill_switch.outputs.enabled == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Setup .NET 11 (stable)
        id: setup_dotnet11_stable_lts
        continue-on-error: true
        if: steps.canary_lts_kill_switch.outputs.enabled == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ vars.DOTNET_PREVIEW_SETUP_VERSION != '' && vars.DOTNET_PREVIEW_SETUP_VERSION || '11.0.x' }}

      - name: Setup .NET 11 (preview fallback)
        if: steps.canary_lts_kill_switch.outputs.enabled == 'true' && steps.setup_dotnet11_stable_lts.outcome == 'failure'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ vars.DOTNET_PREVIEW_SETUP_VERSION != '' && vars.DOTNET_PREVIEW_SETUP_VERSION || '11.0.x' }}
          dotnet-quality: preview

      # USE_DOTNET_PREVIEW=false skips preview SDK; global.json uses stable SDK below.
      - name: Setup .NET Preview
        if: steps.canary_lts_kill_switch.outputs.enabled == 'true' && vars.USE_DOTNET_PREVIEW != 'false'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ vars.DOTNET_PREVIEW_SETUP_VERSION }}
          dotnet-quality: preview

      # Pin sdk.version for CI; preview band follows USE_DOTNET_PREVIEW; stable path prefers .NET 11 for net11.0-windows TFMs.
      - name: Pin SDK via global.json
        if: steps.canary_lts_kill_switch.outputs.enabled == 'true'
        env:
          DOTNET_PREVIEW_SDK_BAND: ${{ vars.DOTNET_PREVIEW_SDK_BAND }}
          USE_DOTNET_PREVIEW: ${{ vars.USE_DOTNET_PREVIEW }}
        run: |
          $ErrorActionPreference = 'Stop'
          function Get-ListedSdkVersion([string]$Pattern) {
            $hit = dotnet --list-sdks | Select-String $Pattern | Select-Object -Last 1
            if (-not $hit) { return $null }
            $line = $hit.Line.TrimEnd()
            if ($line -match '^(\d+\.\d+\.\d+)\s') { return $Matches[1] }
            return (($line -split '\s+', 2)[0])
          }

          $usePreview = $env:USE_DOTNET_PREVIEW -ne 'false'
          $sdkVersion = $null
          if (-not $usePreview) {
            $sdkVersion = Get-ListedSdkVersion '11.0'
            if (-not $sdkVersion) { $sdkVersion = Get-ListedSdkVersion '10.0' }
            if (-not $sdkVersion) { $sdkVersion = Get-ListedSdkVersion '9.0' }
          } else {
            if (-not $env:DOTNET_PREVIEW_SDK_BAND) {
              Write-Error 'DOTNET_PREVIEW_SDK_BAND is not set (repository variable).'
            }
            $sdkVersion = Get-ListedSdkVersion $env:DOTNET_PREVIEW_SDK_BAND
            if (-not $sdkVersion) {
              $sdkVersion = Get-ListedSdkVersion '11.0'
            }
            if (-not $sdkVersion) {
              $sdkVersion = Get-ListedSdkVersion '10.0'
            }
          }
          if (-not $sdkVersion) {
            Write-Error 'Could not resolve an SDK version for global.json.'
          }
          Write-Host "Using SDK $sdkVersion"
          @"
          {
            "sdk": {
              "version": "$sdkVersion",
              "rollForward": "latestFeature"
            }
          }
          "@ | Out-File -Encoding utf8 global.json

      - name: Setup MSBuild
        if: steps.canary_lts_kill_switch.outputs.enabled == 'true'
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Setup NuGet
        if: steps.canary_lts_kill_switch.outputs.enabled == 'true'
        uses: NuGet/setup-nuget@v4

      - name: Cache NuGet
        if: steps.canary_lts_kill_switch.outputs.enabled == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # V105-LTS: no Krypton.Toolkit.Utilities project and no WebView2 build dependency.
      # Uncomment for V120-LTS only (see build.yml "Populate WebView2"); runs on refs/heads/V120-LTS.
