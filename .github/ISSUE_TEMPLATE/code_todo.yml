name: "📝 Code ToDo"
description: "Track work identified by an inline TODO/ToDo comment in source code"
labels:
  - todo :spiral_notepad:
  - backlog
  - version:all versions
body:
  - type: markdown
    attributes:
      value: |
        ## Code ToDo

        Use this template when filing a task that originates from an inline code comment.

        **Automatic tracking:** The [Scan code TODOs](https://github.com/Krypton-Suite/Standard-Toolkit/actions/workflows/scan-code-todos.yml) workflow can create issues from comments marked with the opt-in syntax. `FIXME(issue):` comments are filed as [Bug Reports](https://github.com/Krypton-Suite/Standard-Toolkit/blob/master/.github/ISSUE_TEMPLATE/bug_report.yml). See the [developer guide](https://github.com/Krypton-Suite/Standard-Toolkit/blob/master/Documents/scan-code-todos-developer-guide.md) for full details.

        ```csharp
        // ToDo(issue): Short description of the work
        ```

        Plain `TODO` / `ToDo` comments are ignored by default to avoid flooding the issue tracker. `FIXME(issue):` comments are filed as [Bug Reports](https://github.com/Krypton-Suite/Standard-Toolkit/blob/master/.github/ISSUE_TEMPLATE/bug_report.yml). `HACK(issue):` comments are filed as Code ToDo issues with the `has workaround` label.

  - type: input
    id: summary
    attributes:
      label: "Summary"
      description: "A brief summary of the code ToDo."
      placeholder: "Create a new API for combo box scaling"
    validations:
      required: true

  - type: textarea
    id: source-location
    attributes:
      label: "Source location"
      description: "File path and line number, or a link to the source line on GitHub."
      placeholder: "Source/Krypton Components/Krypton.Toolkit/Controls Toolkit/KryptonComboBox.cs:2666"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Describe the work required. Include the original comment text if helpful."
      placeholder: "ToDo(issue): Create a new API for this in a later version"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: "Notes (optional)"
      description: "Implementation ideas, related issues, or acceptance criteria."
    validations:
      required: false
